<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Ocupación — Paraíso del Mar</title>
<style>
  :root {
    --teal:      #007c89;
    --teal-lt:   #71aeb7;
    --teal-pale: #e8f4f6;
    --navy:      #003660;
    --navy-lt:   #0a4a7a;
    --emerald:   #006b35;
    --dust:      #f2efec;
    --white:     #ffffff;
    --ink:       #1a2e3a;
    --ink-mid:   #3d5a66;
    --border:    #c2d8dd;
    --ok:        #006b35;
    --warn:      #c87533;
    --col-width: 38px;
    --row-height: 42px;
    --label-width: 150px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Verdana, Geneva, sans-serif; background: var(--dust); color: var(--ink); min-height: 100vh; font-size: 12px; }

  /* ── LOGIN ── */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--navy); flex-direction: column;
  }
  .login-box {
    background: var(--white); border-radius: 4px; width: 100%;
    max-width: 380px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .login-header {
    background: var(--navy); padding: 28px 28px 20px;
    text-align: center; border-bottom: 3px solid var(--teal);
  }
  .login-header svg { width: 48px; height: 48px; margin-bottom: 10px; }
  .login-title { font-size: 16px; font-weight: bold; color: var(--white); letter-spacing: 0.1em; text-transform: uppercase; }
  .login-sub { font-size: 10px; color: var(--teal-lt); letter-spacing: 0.14em; margin-top: 4px; }
  .login-body { padding: 24px 28px 28px; }
  .login-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .login-field label { font-size: 9px; font-weight: bold; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mid); }
  .login-field select, .login-field input {
    border: 1px solid var(--border); background: var(--dust);
    padding: 10px 12px; font-family: Verdana, sans-serif;
    font-size: 13px; color: var(--ink); border-radius: 3px;
    outline: none; transition: border-color .15s; width: 100%;
  }
  .login-field select:focus, .login-field input:focus { border-color: var(--teal); background: var(--white); }
  .login-err { color: #c0392b; font-size: 11px; margin-bottom: 10px; display: none; padding: 8px 12px; background: #fdf0ef; border-radius: 3px; }
  .btn-login {
    width: 100%; background: var(--teal); color: var(--white); border: none;
    padding: 12px; font-family: Verdana, sans-serif; font-size: 11px;
    font-weight: bold; letter-spacing: 0.14em; text-transform: uppercase;
    border-radius: 3px; cursor: pointer; transition: background .15s;
  }
  .btn-login:hover { background: var(--navy); }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; }

  /* ── HEADER ── */
  .header {
    background: var(--navy); color: var(--white);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-logo { font-size: 10px; color: var(--teal-lt); letter-spacing: 0.1em; text-transform: uppercase; }
  .header h1 { font-size: 16px; font-weight: bold; letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px; padding: 4px 12px;
    font-size: 10px; color: var(--teal-lt);
  }
  .user-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--teal); color: var(--white);
    font-size: 9px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-back {
    background: rgba(255,255,255,0.1); color: var(--white);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 14px; border-radius: 4px; font-size: 11px;
    cursor: pointer; text-decoration: none; transition: background 0.15s;
    font-family: Verdana, sans-serif;
  }
  .btn-back:hover { background: rgba(255,255,255,0.2); }
  .btn-logout {
    background: transparent; color: var(--teal-lt);
    border: 1px solid rgba(113,174,183,.3);
    padding: 5px 12px; border-radius: 4px; font-size: 10px;
    cursor: pointer; font-family: Verdana, sans-serif;
    transition: all .15s;
  }
  .btn-logout:hover { background: rgba(255,255,255,.08); }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .nav-month { display: flex; align-items: center; gap: 6px; }
  .btn-nav {
    background: var(--teal-pale); border: 1px solid var(--border);
    color: var(--teal); width: 30px; height: 30px; border-radius: 4px;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-nav:hover { border-color: var(--teal); }
  .month-label {
    font-size: 14px; font-weight: bold; color: var(--navy);
    min-width: 155px; text-align: center; text-transform: capitalize;
  }
  .btn-hoy {
    background: var(--navy); color: white; border: none;
    padding: 6px 14px; border-radius: 4px; font-size: 11px;
    font-family: Verdana, sans-serif; cursor: pointer; font-weight: bold;
  }
  .btn-hoy:hover { background: var(--navy-lt); }
  .sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .filter-grupo { display: flex; align-items: center; gap: 6px; }
  .filter-grupo label { font-size: 11px; color: var(--ink-mid); font-weight: bold; white-space: nowrap; }
  .filter-grupo select {
    border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 8px; font-size: 11px; color: var(--ink);
    background: var(--white); cursor: pointer; font-family: Verdana, sans-serif;
    max-width: 180px;
  }
  .filter-grupo select:focus { outline: none; border-color: var(--teal); }

  /* ── LEYENDA ── */
  .leyenda {
    padding: 7px 24px; display: flex; gap: 18px; align-items: center;
    background: var(--white); border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .leyenda-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-mid); }
  .leyenda-dot { width: 12px; height: 12px; border-radius: 3px; }

  /* ── CALENDARIO ── */
  .cal-wrapper { padding: 16px 24px; overflow-x: auto; }
  .cal-container {
    display: inline-block; min-width: 100%;
    background: var(--white); border-radius: 8px;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,54,96,0.07);
  }
  .cal-header {
    display: flex; border-bottom: 2px solid var(--border);
    background: var(--navy); position: sticky; top: 0; z-index: 10;
  }
  .cal-header-label {
    width: var(--label-width); min-width: var(--label-width);
    padding: 10px 14px; font-size: 11px; font-weight: bold;
    color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px;
    border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
  }
  .cal-days-header { display: flex; flex: 1; }
  .day-header {
    width: var(--col-width); min-width: var(--col-width);
    text-align: center; padding: 5px 2px; font-size: 10px;
    color: rgba(255,255,255,0.75); border-right: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .day-header .day-num { font-size: 13px; font-weight: bold; color: white; display: block; line-height: 1.2; }
  .day-header.hoy { background: var(--teal); }
  .day-header.weekend { background: rgba(255,255,255,0.05); }

  .edificio-grupo {}
  .edificio-label { background: var(--teal-pale); border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .edificio-label-text {
    width: var(--label-width); min-width: var(--label-width);
    padding: 6px 14px; font-size: 10px; font-weight: bold;
    color: var(--teal); text-transform: uppercase; letter-spacing: 0.8px;
    border-right: 1px solid var(--border); flex-shrink: 0;
  }
  .edificio-days-strip { flex: 1; height: 24px; display: flex; }
  .edificio-day-cell { width: var(--col-width); min-width: var(--col-width); border-right: 1px solid var(--border); background: var(--teal-pale); flex-shrink: 0; }
  .edificio-day-cell.weekend { background: #dceef1; }

  .unidad-row {
    display: flex; border-bottom: 1px solid var(--border);
    height: var(--row-height); position: relative;
  }
  .unidad-row:last-child { border-bottom: none; }
  .unidad-row:hover { background: #fafefe; }
  .unidad-label {
    width: var(--label-width); min-width: var(--label-width);
    padding: 0 14px; font-size: 12px; font-weight: bold; color: var(--ink);
    border-right: 1px solid var(--border);
    display: flex; align-items: center; flex-shrink: 0;
    background: var(--white); position: sticky; left: 0; z-index: 5;
  }
  .unidad-cells { display: flex; flex: 1; position: relative; height: 100%; }
  .day-cell { width: var(--col-width); min-width: var(--col-width); border-right: 1px solid #edf4f6; height: 100%; flex-shrink: 0; }
  .day-cell.weekend { background: #fafafa; }
  .day-cell.hoy { background: #e8f7f9; }

  .reserva-block {
    position: absolute; top: 5px; height: calc(var(--row-height) - 10px);
    border-radius: 4px; display: flex; align-items: center;
    padding: 0 8px; font-size: 10px; font-weight: bold; color: white;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    transition: opacity 0.15s; z-index: 3;
  }
  .reserva-block:hover { opacity: 0.88; }

  /* Colores por tipo — mapeados a los tipos reales del sistema */
  .tipo-H  { background: linear-gradient(90deg, #006b35, #008a45); }
  .tipo-R  { background: linear-gradient(90deg, #007c89, #009aaa); }
  .tipo-G  { background: linear-gradient(90deg, #5a6fa8, #7a8fc8); }
  .tipo-P  { background: linear-gradient(90deg, #7b4fa6, #9b6fc6); }
  .tipo-otro { background: linear-gradient(90deg, #b05020, #d06030); }

  /* TOOLTIP */
  .tooltip {
    display: none; position: fixed;
    background: var(--ink); color: white;
    padding: 10px 14px; border-radius: 6px; font-size: 11px;
    line-height: 1.6; z-index: 1000; max-width: 230px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none;
    font-family: Verdana, sans-serif;
  }
  .tooltip.visible { display: block; }
  .tooltip-nombre { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  .tooltip-row { color: rgba(255,255,255,0.8); font-size: 10px; }

  /* ESTADO */
  .estado-msg { padding: 60px 24px; text-align: center; color: var(--ink-mid); font-size: 13px; }
  .spinner {
    display: inline-block; width: 26px; height: 26px;
    border: 3px solid var(--border); border-top-color: var(--teal);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sin-datos { padding: 40px; text-align: center; color: var(--ink-mid); font-size: 12px; font-style: italic; }

  @media (max-width: 600px) {
    :root { --col-width: 30px; --label-width: 100px; }
    .toolbar { padding: 8px 12px; }
    .cal-wrapper { padding: 10px; }
    .header { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-header">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="25" stroke="#71aeb7" stroke-width="1"/>
        <path d="M26 38 V20" stroke="#71aeb7" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M26 22 Q20 14 12 16 Q18 18 22 24" stroke="#71aeb7" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <path d="M26 22 Q32 14 40 16 Q34 18 30 24" stroke="#71aeb7" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <path d="M26 26 Q19 20 13 23 Q19 23 23 28" stroke="#71aeb7" stroke-width="1" stroke-linecap="round" fill="none"/>
        <path d="M26 26 Q33 20 39 23 Q33 23 29 28" stroke="#71aeb7" stroke-width="1" stroke-linecap="round" fill="none"/>
        <path d="M16 41 Q21 38 26 40 Q31 38 36 41" stroke="#71aeb7" stroke-width="1" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="login-title">Paraíso del Mar</div>
      <div class="login-sub">Calendario de Ocupación</div>
    </div>
    <div class="login-body">
      <div class="login-field">
        <label>Usuario</label>
        <select id="login-nombre">
          <option value="">— Seleccionar —</option>
          <option>Beatriz Loubet</option>
          <option>Christopher Davila</option>
          <option>Mario Orozco</option>
          <option>Cristina Robledo</option>
          <option>Bernardo Zuñiga</option>
        </select>
      </div>
      <div class="login-field">
        <label>Contraseña</label>
        <input id="login-password" type="password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-err" class="login-err">Usuario o contraseña incorrectos.</div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Ingresar</button>
    </div>

</div>

<!-- ── APP ───────────────────────────────────────────────── -->
<div id="appScreen" style="display:none">

  <div class="header">
    <div>
      <div class="header-logo">Paraíso del Mar</div>
      <h1>Calendario de Ocupación</h1>
    </div>
    <div class="header-right">
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userNombre">—</span>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      <a href="index.html" class="btn-back">← Menú</a>
    </div>
  </div>

  <div class="toolbar">
    <div class="nav-month">
      <button class="btn-nav" id="btnPrev">‹</button>
      <span class="month-label" id="monthLabel">—</span>
      <button class="btn-nav" id="btnNext">›</button>
    </div>
    <button class="btn-hoy" id="btnHoy">Hoy</button>

    <div class="sep"></div>

    <div class="filter-grupo">
      <label>Edificio:</label>
      <select id="filtroEdificio">
        <option value="">Todos</option>
      </select>
    </div>

    <div class="filter-grupo">
      <label>Unidad:</label>
      <select id="filtroUnidad">
        <option value="">Todas</option>
      </select>
    </div>
  </div>

  <div class="leyenda">
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#006b35"></div> Propietario (H)</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#007c89"></div> Renta (R)</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#5a6fa8"></div> Invitado (G)</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#7b4fa6"></div> Residente (P)</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#b05020"></div> Otro</div>
  </div>

  <div class="cal-wrapper">
    <div id="calContainer" class="cal-container">
      <div class="estado-msg">
        <div class="spinner"></div><br>Cargando…
      </div>
    </div>
  </div>

</div><!-- /appScreen -->

<div class="tooltip" id="tooltip">
  <div class="tooltip-nombre" id="tt-nombre"></div>
  <div class="tooltip-row" id="tt-unidad"></div>
  <div class="tooltip-row" id="tt-fechas"></div>
  <div class="tooltip-row" id="tt-tipo"></div>
  <div class="tooltip-row" id="tt-notas"></div>
</div>

<script>
const API_BASE = 'https://paraiso-del-mar-backend.onrender.com';
const TOKEN_KEY  = 'pdm_token';
const USER_KEY   = 'pdm_usuario';

let currentYear, currentMonth;
let todosRegistros = [];
let filtroEdificio = '';
let filtroUnidad   = '';
let usuarioActual  = null;

// ── LOGIN ──────────────────────────────────────────────────────────
async function doLogin() {
  const nombre   = document.getElementById('login-nombre').value;
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('btnLogin');
  if (!nombre || !password) {
    errEl.textContent = 'Seleccione usuario e ingrese contraseña.';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Verificando…';
  errEl.style.display = 'none';
  try {
    const res  = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, password })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      errEl.textContent = data.error || 'Usuario o contraseña incorrectos.';
      errEl.style.display = 'block';
    } else {
      usuarioActual = data.usuario;
      sessionStorage.setItem(USER_KEY,  JSON.stringify(usuarioActual));
      sessionStorage.setItem(TOKEN_KEY, data.token);
      iniciarApp();
    }
  } catch(e) {
    errEl.textContent = 'Error de conexión. Intente de nuevo.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
}

function cerrarSesion() {
  sessionStorage.removeItem(USER_KEY);
  sessionStorage.removeItem(TOKEN_KEY);
  usuarioActual = null;
  document.getElementById('appScreen').style.display   = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

function authHeaders() {
  const token = sessionStorage.getItem(TOKEN_KEY) || '';
  return token ? { 'Authorization': `Bearer ${token}` } : {};
}

// ── INIT ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Verificar si ya hay sesión activa
  const saved = sessionStorage.getItem(USER_KEY);
  if (saved) {
    usuarioActual = JSON.parse(saved);
    iniciarApp();
  }
  // Listeners navegación mes
  document.getElementById('btnPrev').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendario();
  });
  document.getElementById('btnNext').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendario();
  });
  document.getElementById('btnHoy').addEventListener('click', () => {
    const h = new Date();
    currentYear = h.getFullYear(); currentMonth = h.getMonth();
    renderCalendario();
  });
  document.getElementById('filtroEdificio').addEventListener('change', e => {
    filtroEdificio = e.target.value;
    filtroUnidad   = '';
    actualizarFiltroUnidad();
    renderCalendario();
  });
  document.getElementById('filtroUnidad').addEventListener('change', e => {
    filtroUnidad = e.target.value;
    renderCalendario();
  });
});

function iniciarApp() {
  const hoy = new Date();
  currentYear  = hoy.getFullYear();
  currentMonth = hoy.getMonth();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'block';
  document.getElementById('userNombre').textContent    = usuarioActual.nombre.split(' ')[0];
  document.getElementById('userAvatar').textContent    = usuarioActual.nombre.charAt(0).toUpperCase();
  cargarRegistros();
}

// ── DATOS ──────────────────────────────────────────────────────────
async function cargarRegistros() {
  document.getElementById('calContainer').innerHTML =
    '<div class="estado-msg"><div class="spinner"></div><br>Cargando registros…</div>';
  try {
    const res  = await fetch(`${API_BASE}/api/inhouse?limit=2000&estado=`, { headers: authHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    todosRegistros = Array.isArray(data) ? data : (data.registros || data.data || []);
    poblarFiltros();
    renderCalendario();
  } catch(err) {
    document.getElementById('calContainer').innerHTML =
      `<div class="estado-msg">⚠️ No se pudieron cargar los datos.<br><small style="color:#c87533">${err.message}</small></div>`;
  }
}

function poblarFiltros() {
  // Edificios
  const selEd = document.getElementById('filtroEdificio');
  selEd.innerHTML = '<option value="">Todos</option>';
  const edificios = [...new Set(todosRegistros.map(r => r.edificio).filter(Boolean))].sort();
  edificios.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e; opt.textContent = `Edificio ${e}`;
    selEd.appendChild(opt);
  });
  actualizarFiltroUnidad();
}

function actualizarFiltroUnidad() {
  const sel = document.getElementById('filtroUnidad');
  sel.innerHTML = '<option value="">Todas</option>';
  // Obtener unidades únicas según el filtro de edificio activo
  let fuente = todosRegistros;
  if (filtroEdificio) fuente = fuente.filter(r => r.edificio === filtroEdificio);
  const unidades = [...new Set(fuente.map(r => r.unidad).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'es', { numeric: true }));
  unidades.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u; opt.textContent = u;
    sel.appendChild(opt);
  });
  document.getElementById('filtroUnidad').value = '';
}

// ── RENDER ─────────────────────────────────────────────────────────
function renderCalendario() {
  const container  = document.getElementById('calContainer');
  const hoy        = new Date();
  const diasEnMes  = new Date(currentYear, currentMonth + 1, 0).getDate();

  // Label mes
  const label = new Date(currentYear, currentMonth, 1)
    .toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
  document.getElementById('monthLabel').textContent =
    label.charAt(0).toUpperCase() + label.slice(1);

  const mesInicio = new Date(currentYear, currentMonth, 1);
  const mesFin    = new Date(currentYear, currentMonth, diasEnMes);

  // Filtrar por mes (permanentes tipo P con fecha_salida null siempre se muestran)
  let registros = todosRegistros.filter(r => {
    if (!r.fecha_ingreso) return false;
    const entrada = new Date(r.fecha_ingreso.substring(0,10) + 'T00:00:00');
    if (!r.fecha_salida) return entrada <= mesFin; // permanente: visible desde su ingreso
    const salida = new Date(r.fecha_salida.substring(0,10) + 'T00:00:00');
    return entrada <= mesFin && salida >= mesInicio;
  });

  // Aplicar filtros
  if (filtroEdificio) registros = registros.filter(r => r.edificio === filtroEdificio);
  if (filtroUnidad)   registros = registros.filter(r => r.unidad   === filtroUnidad);

  // Construir mapa grupos edificio → unidad → registros
  // Incluir también unidades conocidas (aunque no tengan registros este mes)
  const grupos = {};

  // Primero, todas las unidades conocidas según filtros
  let fuenteUnidades = todosRegistros;
  if (filtroEdificio) fuenteUnidades = fuenteUnidades.filter(r => r.edificio === filtroEdificio);
  if (filtroUnidad)   fuenteUnidades = fuenteUnidades.filter(r => r.unidad   === filtroUnidad);
  fuenteUnidades.forEach(r => {
    const ed = r.edificio || 'Sin edificio';
    const un = r.unidad   || 'Sin unidad';
    if (!grupos[ed]) grupos[ed] = {};
    if (!grupos[ed][un]) grupos[ed][un] = [];
  });

  // Luego asignar registros del mes
  registros.forEach(r => {
    const ed = r.edificio || 'Sin edificio';
    const un = r.unidad   || 'Sin unidad';
    if (!grupos[ed]) grupos[ed] = {};
    if (!grupos[ed][un]) grupos[ed][un] = [];
    grupos[ed][un].push(r);
  });

  if (Object.keys(grupos).length === 0) {
    container.innerHTML = '<div class="sin-datos">Sin unidades para mostrar.</div>';
    return;
  }

  let html = '';

  // Header días
  html += `<div class="cal-header">
    <div class="cal-header-label">Unidad</div>
    <div class="cal-days-header">`;
  for (let d = 1; d <= diasEnMes; d++) {
    const fecha  = new Date(currentYear, currentMonth, d);
    const dow    = fecha.getDay();
    const esHoy  = fecha.toDateString() === hoy.toDateString();
    const esFin  = dow === 0 || dow === 6;
    const dn     = fecha.toLocaleDateString('es-MX', { weekday: 'short' }).substring(0,2);
    html += `<div class="day-header${esHoy?' hoy':''}${esFin?' weekend':''}">
      <span class="day-num">${d}</span>${dn}</div>`;
  }
  html += `</div></div>`;

  // Grupos
  Object.keys(grupos).sort().forEach(edificio => {
    html += `<div class="edificio-grupo">
      <div class="edificio-label">
        <div class="edificio-label-text">${edificio === 'Sin edificio' ? 'Sin edificio' : 'Edificio ' + edificio}</div>
        <div class="edificio-days-strip">`;
    for (let d = 1; d <= diasEnMes; d++) {
      const dow = new Date(currentYear, currentMonth, d).getDay();
      html += `<div class="edificio-day-cell${(dow===0||dow===6)?' weekend':''}"></div>`;
    }
    html += `</div></div>`;

    Object.keys(grupos[edificio]).sort((a,b) => a.localeCompare(b,'es',{numeric:true})).forEach(unidad => {
      html += `<div class="unidad-row">
        <div class="unidad-label">${unidad}</div>
        <div class="unidad-cells" id="cells-${san(edificio)}-${san(unidad)}">`;
      for (let d = 1; d <= diasEnMes; d++) {
        const fecha = new Date(currentYear, currentMonth, d);
        const dow   = fecha.getDay();
        const esHoy = fecha.toDateString() === hoy.toDateString();
        html += `<div class="day-cell${esHoy?' hoy':''}${(dow===0||dow===6)?' weekend':''}"></div>`;
      }
      html += `</div></div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;

  // Pintar bloques
  const colW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--col-width')) || 38;

  Object.keys(grupos).sort().forEach(edificio => {
    Object.keys(grupos[edificio]).sort((a,b) => a.localeCompare(b,'es',{numeric:true})).forEach(unidad => {
      const cellsDiv = document.getElementById(`cells-${san(edificio)}-${san(unidad)}`);
      if (!cellsDiv) return;
      grupos[edificio][unidad].forEach(r => {
        const entrada = new Date(r.fecha_ingreso.substring(0,10) + 'T00:00:00');
        // Permanentes sin fecha_salida: bloque cubre todo el mes
        const salida  = r.fecha_salida
          ? new Date(r.fecha_salida.substring(0,10) + 'T00:00:00')
          : null;

        let diaInicio = (entrada.getFullYear() === currentYear && entrada.getMonth() === currentMonth)
          ? entrada.getDate() : 1;
        let diaFin = diasEnMes; // default para permanentes
        if (salida) {
          diaFin = (salida.getFullYear() === currentYear && salida.getMonth() === currentMonth)
            ? salida.getDate() : diasEnMes;
        }

        diaInicio = Math.max(1, diaInicio);
        diaFin    = Math.min(diasEnMes, diaFin);
        if (diaInicio > diaFin) return;

        const left  = (diaInicio - 1) * colW + 2;
        const width = (diaFin - diaInicio + 1) * colW - 4;
        const tipo  = (r.tipo || '').trim().toUpperCase();
        const cls   = tipo === 'H' ? 'tipo-H'
                    : tipo === 'R' ? 'tipo-R'
                    : tipo === 'G' ? 'tipo-G'
                    : tipo === 'P' ? 'tipo-P'
                    : 'tipo-otro';

        const bloque = document.createElement('div');
        bloque.className = `reserva-block ${cls}`;
        bloque.style.left  = `${left}px`;
        bloque.style.width = `${width}px`;
        bloque.textContent = r.nombre_huesped || '—';
        bloque.addEventListener('mouseenter', e => mostrarTooltip(e, r));
        bloque.addEventListener('mousemove',  e => moverTooltip(e));
        bloque.addEventListener('mouseleave', ocultarTooltip);
        cellsDiv.appendChild(bloque);
      });
    });
  });
}

// ── TOOLTIP ────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function mostrarTooltip(e, r) {
  const tipos = { H:'Propietario', R:'Renta', G:'Invitado', P:'Residente' };
  document.getElementById('tt-nombre').textContent  = r.nombre_huesped || '—';
  document.getElementById('tt-unidad').textContent  = `Unidad: ${r.unidad || '—'} · ${r.edificio ? 'Edificio '+r.edificio : ''}`;
  document.getElementById('tt-fechas').textContent  = `${fmtF(r.fecha_ingreso)} → ${fmtF(r.fecha_salida)}`;
  document.getElementById('tt-tipo').textContent    = `Tipo: ${tipos[r.tipo] || r.tipo || '—'} · ${r.num_personas || 1} persona(s)`;
  document.getElementById('tt-notas').textContent   = r.notas ? `Notas: ${r.notas}` : '';
  tooltip.classList.add('visible');
  moverTooltip(e);
}
function moverTooltip(e) {
  tooltip.style.left = `${Math.min(e.clientX + 14, window.innerWidth - 250)}px`;
  tooltip.style.top  = `${e.clientY - 10}px`;
}
function ocultarTooltip() { tooltip.classList.remove('visible'); }

// ── UTILS ──────────────────────────────────────────────────────────
function san(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }
function fmtF(f) {
  if (!f) return '—';
  const [y,m,d] = f.split('-');
  return `${d}/${m}/${y}`;
}
</script>

</html>
