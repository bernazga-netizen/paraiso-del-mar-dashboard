<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Control de Acceso — Paraíso del Mar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal:        #007c89;
            --teal-dark:   #005f6a;
            --teal-light:  #71aeb7;
            --teal-xlight: #c8e8ec;
            --navy:        #003660;
            --navy-dark:   #002244;
            --navy-mid:    #004a80;
            --dusty:       #f2efec;
            --cactus:      #8a941e;
            --emerald:     #006b35;
            --soft-blue:   #71aeb7;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--dusty);
            min-height: 100vh;
        }

        /* ═══════════════════════════════════════
           LOGIN
        ═══════════════════════════════════════ */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 50%, var(--teal-dark) 100%);
            position: relative;
            overflow: hidden;
        }

        /* Decorative wave background */
        .login-screen::before {
            content: '';
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 1px solid rgba(113,174,183,0.15);
        }
        .login-screen::after {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(113,174,183,0.1);
        }

        .login-card {
            background: white;
            width: 380px;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.45);
            position: relative;
            z-index: 1;
        }

        .login-brand {
            background: var(--navy);
            padding: 36px 32px 28px;
            text-align: center;
            border-bottom: 3px solid var(--teal);
        }

        .login-brand img {
            width: 130px;
            height: auto;
            display: block;
            margin: 0 auto;
            /* logo tiene fondo negro, invertimos a blanco */
            filter: brightness(0) invert(1);
        }

        .login-module-label {
            margin-top: 20px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--teal-light);
        }

        .login-divider {
            width: 40px;
            height: 1px;
            background: var(--teal);
            margin: 10px auto 0;
            opacity: 0.5;
        }

        .login-body {
            padding: 28px 32px 32px;
            background: white;
        }

        .field-label {
            display: block;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--navy);
            margin-bottom: 6px;
        }

        .login-body select,
        .login-body input[type=password] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0dde0;
            border-radius: 2px;
            background: var(--dusty);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            color: var(--navy);
            margin-bottom: 14px;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        .login-body select:focus,
        .login-body input[type=password]:focus {
            border-color: var(--teal);
            background: white;
        }

        .login-err {
            display: none;
            font-size: 11px;
            color: #c0392b;
            background: #fdf0ef;
            border-left: 3px solid #c0392b;
            padding: 8px 12px;
            border-radius: 2px;
            margin-bottom: 14px;
        }

        .btn-login {
            width: 100%;
            background: var(--teal);
            color: white;
            border: none;
            padding: 13px;
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-login:hover { background: var(--navy); }
        .btn-login:disabled { opacity: .5; cursor: not-allowed; }

        /* ═══════════════════════════════════════
           DASHBOARD
        ═══════════════════════════════════════ */
        .dashboard-screen {
            min-height: 100vh;
            background: var(--dusty);
        }

        /* Top bar */
        .topbar {
            background: var(--navy);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-brand img {
            height: 36px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .topbar-separator {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.2);
        }

        .topbar-module {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal-light);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-user {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .btn-logout {
            background: transparent;
            color: var(--teal-light);
            border: 1px solid rgba(113,174,183,0.35);
            padding: 6px 14px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-logout:hover {
            background: rgba(113,174,183,0.15);
            color: white;
        }

        /* Content area */
        .content-area {
            max-width: 1320px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 2px;
            margin-bottom: 24px;
            border-bottom: 2px solid rgba(0,124,137,0.2);
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 24px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #8a9fa5;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all .2s;
        }
        .tab-btn.active {
            color: var(--teal);
            border-bottom-color: var(--teal);
        }
        .tab-btn:hover:not(.active) {
            color: var(--navy);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Controls row */
        .controls-row {
            background: white;
            border: 1px solid rgba(0,54,96,0.1);
            border-radius: 2px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .ctrl-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--navy);
        }

        .controls-row input[type=date],
        .controls-row input[type=time],
        .controls-row select,
        .controls-row input[type=text] {
            padding: 8px 12px;
            border: 1px solid #c8d8dc;
            border-radius: 2px;
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            color: var(--navy);
            background: var(--dusty);
            outline: none;
        }
        .controls-row input:focus,
        .controls-row select:focus { border-color: var(--teal); background: white; }

        .btn-primary {
            background: var(--teal);
            color: white;
            border: none;
            padding: 9px 20px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-primary:hover { background: var(--navy); }

        .btn-excel {
            background: var(--emerald);
            color: white;
            border: none;
            padding: 9px 20px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-excel:hover { background: #004f26; }

        .btn-clear {
            background: transparent;
            color: #8a9fa5;
            border: 1px solid #c8d8dc;
            padding: 8px 16px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-clear:hover { border-color: var(--teal); color: var(--teal); }

        /* Filter panel */
        .filter-panel {
            background: white;
            border: 1px solid rgba(0,54,96,0.1);
            border-left: 3px solid var(--teal);
            border-radius: 2px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .filter-title {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 14px;
        }

        .filter-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .badge-filtro {
            background: var(--teal-xlight);
            color: var(--teal-dark);
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 11px;
            display: inline-block;
            margin: 3px;
            font-weight: 500;
        }

        /* KPI cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: white;
            border: 1px solid rgba(0,54,96,0.08);
            border-radius: 2px;
            padding: 20px 20px 16px;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--teal);
        }

        .kpi-card.total::before { background: var(--navy); }
        .kpi-card.muelle::before { background: var(--teal); }
        .kpi-card.base4::before { background: var(--cactus); }
        .kpi-card.base1::before { background: var(--soft-blue); }

        .kpi-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 44px;
            font-weight: 300;
            color: var(--navy);
            line-height: 1;
            margin-bottom: 6px;
        }

        .kpi-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #8a9fa5;
        }

        /* Tables */
        .data-table {
            background: white;
            border: 1px solid rgba(0,54,96,0.08);
            border-radius: 2px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .data-table h3 {
            font-family: 'Jost', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--teal-xlight);
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: #f8fafb;
            padding: 10px 12px;
            text-align: left;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--navy);
            border-bottom: 1px solid rgba(0,54,96,0.1);
        }

        td {
            padding: 11px 12px;
            font-size: 13px;
            color: #3a4a52;
            border-bottom: 1px solid rgba(0,54,96,0.05);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafcfc; }

        /* Chart */
        .chart-wrap {
            background: white;
            border: 1px solid rgba(0,54,96,0.08);
            border-radius: 2px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .chart-wrap h3 {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--teal-xlight);
        }

        canvas { max-height: 280px; }

        /* Error / loading */
        .error-box {
            background: #fdf0ef;
            border-left: 3px solid #c0392b;
            color: #c0392b;
            padding: 16px 20px;
            border-radius: 2px;
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(0,124,137,0.2);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-msg {
            text-align: center;
            padding: 40px;
            color: var(--teal);
            font-size: 13px;
            letter-spacing: 0.08em;
        }
    </style>
</head>

                <input type="date" id="auditoriaFechaInicio">
                <span class="ctrl-label">Hasta</span>
                <input type="date" id="auditoriaFechaFin">
                <button class="btn-primary" onclick="cargarAuditoria()">Buscar</button>
                <button class="btn-excel" onclick="exportarAuditoriaExcel()">Exportar</button>
            </div>

            <div class="filter-panel">
                <div class="filter-title">Filtros de auditoría</div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label class="field-label">Usuario</label>
                        <input type="text" id="auditoriaUsuario" placeholder="Nombre del usuario">
                    </div>
                    <div class="filter-group">
                        <label class="field-label">Tipo</label>
                        <select id="auditoriaTipo">
                            <option value="">Todos</option>
                            <option>Dueño</option><option>Rentista</option>
                            <option>Golfista</option><option>Restaurante</option>
                            <option>Proveedor</option><option>Empleado</option>
                            <option>Administrativo</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="field-label">Acceso</label>
                        <select id="auditoriaAcceso">
                            <option value="">Todos</option>
                            <option>Muelle Principal</option>
                            <option>Base 4</option><option>Base 1</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="contenidoAuditoria">
                <div class="loading-msg" style="color:#8a9fa5">Selecciona un rango de fechas y presiona Buscar</div>
            </div>
        </div>

    </div><!-- /content-area -->
</div><!-- /dashboardScreen -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
    const API = 'https://paraiso-del-mar-backend.onrender.com';
    let datosActuales  = null;
    let datosFiltrados = null;
    let chartInstance  = null;
    let datosAuditoria = [];
    let usuarioActual  = null;

    // ── Auth
    function authHeaders() {
        const token = sessionStorage.getItem('pdm_acceso_token');
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    async function cargarUsuarios() {
        try {
            const res  = await fetch(`${API}/api/auth/usuarios-publico`);
            const data = await res.json();
            const sel  = document.getElementById('loginNombre');
            if (data.ok && data.data) {
                data.data.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = u.nombre;
                    sel.appendChild(opt);
                });
            }
        } catch(e) { console.warn('No se pudo cargar lista de usuarios:', e); }
    }

    async function doLogin() {
        const nombre   = document.getElementById('loginNombre').value;
        const password = document.getElementById('loginPassword').value;
        const errEl    = document.getElementById('loginError');
        const btn      = document.getElementById('btnLogin');
        errEl.style.display = 'none';

        if (!nombre || !password) {
            errEl.textContent = 'Selecciona usuario e ingresa contraseña.';
            errEl.style.display = 'block'; return;
        }
        btn.disabled = true;
        btn.textContent = 'Verificando…';

        try {
            const res  = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, password })
            });
            const data = await res.json();
            if (res.ok && data.token) {
                usuarioActual = data.usuario;
                sessionStorage.setItem('pdm_acceso_token',   data.token);
                sessionStorage.setItem('pdm_acceso_usuario', JSON.stringify(data.usuario));
                mostrarDashboard();
            } else {
                errEl.textContent = data.error || 'Usuario o contraseña incorrectos.';
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = 'Error de conexión con el servidor.';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Ingresar';
        }
    }

    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display    = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        if (usuarioActual) {
            document.getElementById('topbarUser').textContent = usuarioActual.nombre || '';
        }
        inicializarFechas();
        cargar();
    }

    function cerrarSesion() {
        sessionStorage.removeItem('pdm_acceso_token');
        sessionStorage.removeItem('pdm_acceso_usuario');
        usuarioActual = null;
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display     = 'flex';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    function inicializarFechas() {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fechaInput').value        = hoy;
        document.getElementById('auditoriaFechaFin').value = hoy;
        const hace7 = new Date();
        hace7.setDate(hace7.getDate() - 7);
        document.getElementById('auditoriaFechaInicio').value = hace7.toISOString().split('T')[0];
    }

    window.addEventListener('load', () => {
        cargarUsuarios();
        const saved = sessionStorage.getItem('pdm_acceso_usuario');
        if (saved && sessionStorage.getItem('pdm_acceso_token')) {
            usuarioActual = JSON.parse(saved);
            mostrarDashboard();
        }
    });

    // ── Tabs
    function cambiarTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((t,i) => {
            t.classList.toggle('active', (tab==='estadisticas' ? i===0 : i===1));
        });
        document.getElementById('tab-estadisticas').classList.toggle('active', tab==='estadisticas');
        document.getElementById('tab-auditoria').classList.toggle('active', tab==='auditoria');
    }

    // ── Estadísticas
    async function cargar() {
        try {
            const fecha = document.getElementById('fechaInput').value;
            const res   = await fetch(`${API}/api/estadisticas/${fecha}`);
            const data  = await res.json();
            datosActuales  = data;
            datosFiltrados = data;
            aplicarFiltros();
        } catch (e) {
            document.getElementById('contenido').innerHTML =
                `<div class="error-box">No se puede conectar a ${API}</div>`;
        }
    }

    // ── Auditoría
    async function cargarAuditoria() {
        try {
            const fechaInicio = document.getElementById('auditoriaFechaInicio').value;
            const fechaFin    = document.getElementById('auditoriaFechaFin').value;
            const usuario     = document.getElementById('auditoriaUsuario').value;
            const tipo        = document.getElementById('auditoriaTipo').value;
            const acceso      = document.getElementById('auditoriaAcceso').value;

            let url = `${API}/api/auditoria?fecha_inicio=${fechaInicio}&fecha_fin=${fechaFin}`;
            if (usuario) url += `&usuario_captura=${encodeURIComponent(usuario)}`;
            if (tipo)    url += `&tipo_persona=${encodeURIComponent(tipo)}`;
            if (acceso)  url += `&acceso=${encodeURIComponent(acceso)}`;

            const res = await fetch(url, { headers: authHeaders() });
            if (res.status === 401 || res.status === 403) { cerrarSesion(); return; }
            datosAuditoria = await res.json();

            if (datosAuditoria.length === 0) {
                document.getElementById('contenidoAuditoria').innerHTML =
                    '<div class="loading-msg" style="color:#8a9fa5">No se encontraron registros</div>';
                return;
            }

            let html = '<div class="data-table"><h3>Histórico de registros (últimos 500)</h3>';
            html += '<table><tr><th>Fecha</th><th>Hora</th><th>Acceso</th><th>Tipo</th><th style="text-align:right">Cantidad</th><th>Usuario</th><th>Timestamp</th></tr>';
            datosAuditoria.forEach(r => {
                const ts = new Date(r.timestamp);
                html += `<tr>
                    <td>${r.fecha}</td><td>${r.hora}</td><td>${r.acceso}</td>
                    <td>${r.tipo_persona}</td><td style="text-align:right">${r.cantidad}</td>
                    <td>${r.usuario_captura}</td>
                    <td>${ts.toLocaleDateString('es-MX')} ${ts.toLocaleTimeString('es-MX')}</td>
                </tr>`;
            });
            html += '</table></div>';
            document.getElementById('contenidoAuditoria').innerHTML = html;
        } catch (e) {
            document.getElementById('contenidoAuditoria').innerHTML =
                `<div class="error-box">No se puede conectar a ${API}</div>`;
        }
    }

    // ── Filtros
    function aplicarFiltros() {
        if (!datosActuales) return;
        const filtroTipo      = document.getElementById('filtroTipo').value;
        const filtroAcceso    = document.getElementById('filtroAcceso').value;
        const filtroHoraDesde = document.getElementById('filtroHoraDesde').value;
        const filtroHoraHasta = document.getElementById('filtroHoraHasta').value;

        let badges = '';
        if (filtroTipo)      badges += `<span class="badge-filtro">Tipo: ${filtroTipo}</span>`;
        if (filtroAcceso)    badges += `<span class="badge-filtro">Acceso: ${filtroAcceso}</span>`;
        if (filtroHoraDesde) badges += `<span class="badge-filtro">Desde: ${filtroHoraDesde}</span>`;
        if (filtroHoraHasta) badges += `<span class="badge-filtro">Hasta: ${filtroHoraHasta}</span>`;
        document.getElementById('filtrosActivos').innerHTML = badges;

        datosFiltrados = JSON.parse(JSON.stringify(datosActuales));

        if (filtroTipo || filtroAcceso) {
            if (datosFiltrados.detalladoPorAccesoYTipo) {
                datosFiltrados.detalladoPorAccesoYTipo = datosFiltrados.detalladoPorAccesoYTipo.filter(d => {
                    if (filtroTipo   && d.tipo_persona !== filtroTipo)   return false;
                    if (filtroAcceso && d.acceso       !== filtroAcceso) return false;
                    return true;
                });
                const tm = {}, am = {};
                datosFiltrados.detalladoPorAccesoYTipo.forEach(d => {
                    tm[d.tipo_persona] = (tm[d.tipo_persona]||0) + parseInt(d.total);
                    am[d.acceso]       = (am[d.acceso]      ||0) + parseInt(d.total);
                });
                datosFiltrados.porTipo   = Object.keys(tm).map(tipo_persona => ({ tipo_persona, total: tm[tipo_persona] }));
                datosFiltrados.porAcceso = Object.keys(am).map(acceso       => ({ acceso,        total: am[acceso] }));
            }
        }

        if ((filtroHoraDesde||filtroHoraHasta) && datosFiltrados.porHora) {
            datosFiltrados.porHora = datosFiltrados.porHora.filter(h => {
                const hora = h.hora.substring(0,5);
                if (filtroHoraDesde && hora < filtroHoraDesde) return false;
                if (filtroHoraHasta && hora > filtroHoraHasta) return false;
                return true;
            });
        }

        datosFiltrados.total = datosFiltrados.detalladoPorAccesoYTipo
            ? datosFiltrados.detalladoPorAccesoYTipo.reduce((s,d) => s + parseInt(d.total), 0)
            : datosFiltrados.total;

        mostrarDatos();
    }

    function limpiarFiltros() {
        ['filtroTipo','filtroAcceso','filtroHoraDesde','filtroHoraHasta'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('filtrosActivos').innerHTML = '';
        datosFiltrados = datosActuales;
        mostrarDatos();
    }

    function mostrarDatos() {
        const data = datosFiltrados;

        // KPIs
        const accesoClases = { 'Muelle Principal':'muelle','Base 4':'base4','Base 1':'base1' };
        let html = '<div class="kpi-grid">';
        html += `<div class="kpi-card total">
            <div class="kpi-num">${data.total}</div>
            <div class="kpi-label">Total del día</div>
        </div>`;

        if (data.detalladoPorAccesoYTipo?.length > 0) {
            ['Muelle Principal','Base 4','Base 1'].forEach(nombreAcceso => {
                const tot = data.detalladoPorAccesoYTipo
                    .filter(d => d.acceso === nombreAcceso)
                    .reduce((s,d) => s + parseInt(d.total), 0);
                if (tot > 0) {
                    const cls = accesoClases[nombreAcceso] || '';
                    html += `<div class="kpi-card ${cls}">
                        <div class="kpi-num">${tot}</div>
                        <div class="kpi-label">${nombreAcceso}</div>
                    </div>`;
                }
            });
        } else if (data.porAcceso) {
            data.porAcceso.forEach(a => {
                const cls = accesoClases[a.acceso] || '';
                html += `<div class="kpi-card ${cls}">
                    <div class="kpi-num">${a.total}</div>
                    <div class="kpi-label">${a.acceso}</div>
                </div>`;
            });
        }
        html += '</div>';

        if (data.porHora?.length > 0) {
            html += '<div class="chart-wrap"><h3>Ingresos por hora</h3><canvas id="chartHora"></canvas></div>';
        }

        if (data.porTipo?.length > 0) {
            html += '<div class="data-table"><h3>Por tipo de persona</h3><table><tr><th>Tipo</th><th style="text-align:right">Cantidad</th></tr>';
            data.porTipo.forEach(t => { html += `<tr><td>${t.tipo_persona}</td><td style="text-align:right">${t.total}</td></tr>`; });
            html += '</table></div>';
        }

        if (data.porAcceso?.length > 0) {
            html += '<div class="data-table"><h3>Por acceso</h3><table><tr><th>Acceso</th><th style="text-align:right">Cantidad</th></tr>';
            data.porAcceso.forEach(a => { html += `<tr><td>${a.acceso}</td><td style="text-align:right">${a.total}</td></tr>`; });
            html += '</table></div>';
        }

        if (data.detalladoPorAccesoYTipo?.length > 0) {
            html += '<div class="data-table"><h3>Detalle por acceso y tipo</h3><table><tr><th>Acceso</th><th>Tipo</th><th style="text-align:right">Cantidad</th></tr>';
            data.detalladoPorAccesoYTipo.forEach(d => {
                html += `<tr><td>${d.acceso}</td><td>${d.tipo_persona}</td><td style="text-align:right">${d.total}</td></tr>`;
            });
            html += '</table></div>';
        }

        document.getElementById('contenido').innerHTML = html;
        if (data.porHora?.length > 0) setTimeout(() => crearGrafica(data.porHora), 100);
    }

    function crearGrafica(porHora) {
        const ctx = document.getElementById('chartHora');
        if (!ctx) return;
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: porHora.map(h => h.hora.substring(0,5)),
                datasets: [{
                    label: 'Ingresos',
                    data: porHora.map(h => h.total),
                    borderColor: '#007c89',
                    backgroundColor: 'rgba(0,124,137,0.07)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#007c89',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(0,54,96,0.06)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // ── Export
    function exportarExcel() {
        if (!datosFiltrados) { alert('No hay datos para exportar'); return; }
        const fecha = document.getElementById('fechaInput').value;
        const wb = XLSX.utils.book_new();
        const resumen = [
            ['PARAÍSO DEL MAR - Reporte de Ingresos'],['Fecha:', fecha],
            ['Total General:', datosFiltrados.total],[''],
            ['Por Acceso'],['Acceso','Cantidad']
        ];
        datosFiltrados.porAcceso?.forEach(a => resumen.push([a.acceso, a.total]));
        resumen.push([''],['Por Tipo de Persona'],['Tipo','Cantidad']);
        datosFiltrados.porTipo?.forEach(t => resumen.push([t.tipo_persona, t.total]));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumen), 'Resumen');
        if (datosFiltrados.detalladoPorAccesoYTipo?.length > 0) {
            const det = [['Acceso','Tipo de Persona','Cantidad']];
            datosFiltrados.detalladoPorAccesoYTipo.forEach(d => det.push([d.acceso, d.tipo_persona, d.total]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(det), 'Detalle');
        }
        if (datosFiltrados.porHora?.length > 0) {
            const ph = [['Hora','Cantidad']];
            datosFiltrados.porHora.forEach(h => ph.push([h.hora, h.total]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ph), 'Por Hora');
        }
        XLSX.writeFile(wb, `Paraiso_del_Mar_${fecha}.xlsx`);
    }

    function exportarAuditoriaExcel() {
        if (!datosAuditoria.length) { alert('No hay datos de auditoría para exportar'); return; }
        const wb  = XLSX.utils.book_new();
        const fi  = document.getElementById('auditoriaFechaInicio').value;
        const ff  = document.getElementById('auditoriaFechaFin').value;
        const data = [
            ['PARAÍSO DEL MAR - Auditoría de Registros'],
            ['Desde:', fi],['Hasta:', ff],[''],
            ['Fecha','Hora','Acceso','Tipo','Cantidad','Usuario','Timestamp']
        ];
        datosAuditoria.forEach(r => {
            const ts = new Date(r.timestamp);
            data.push([r.fecha,r.hora,r.acceso,r.tipo_persona,r.cantidad,r.usuario_captura,
                `${ts.toLocaleDateString('es-MX')} ${ts.toLocaleTimeString('es-MX')}`]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Auditoría');
        XLSX.writeFile(wb, `Auditoria_${fi}_a_${ff}.xlsx`);
    }

    setInterval(() => { if (sessionStorage.getItem('pdm_acceso_token')) cargar(); }, 30000);
</script>
</body>
</html>
