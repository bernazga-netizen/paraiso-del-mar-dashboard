<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Control de Acceso — Paraíso del Mar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #667eea; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #1a237e; color: white; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 20px; position: relative; }
        .header h1 { font-size: 32px; }
        .header p { margin-top: 6px; font-size: 14px; opacity: .85; }
        .btn-logout-header { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.3); padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-logout-header:hover { background: rgba(255,255,255,.25); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: white; color: #1a237e; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; border: 2px solid #1a237e; }
        .tab.active { background: #1a237e; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .controles { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .controles label { font-weight: bold; color: #1a237e; font-size: 14px; }
        .controles input, .controles select { padding: 10px; border: 2px solid #1a237e; border-radius: 5px; font-size: 14px; }
        .controles button { background: #1a237e; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .controles button:hover { background: #0d47a1; }
        .btn-excel { background: #4caf50; }
        .btn-excel:hover { background: #388e3c; }
        .btn-limpiar { background: #ff9800; }
        .btn-limpiar:hover { background: #f57c00; }
        .filtros-section { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #1a237e; }
        .filtros-title { font-weight: bold; color: #1a237e; margin-bottom: 10px; font-size: 16px; }
        .filtros-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .filtro-group { display: flex; flex-direction: column; gap: 5px; }
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi { background: white; padding: 20px; border-radius: 8px; text-align: center; }
        .kpi-numero { font-size: 36px; font-weight: bold; color: #1a237e; }
        .kpi-label { font-size: 12px; color: #666; margin-top: 5px; }
        .tabla { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .tabla h2 { color: #1a237e; margin-bottom: 15px; border-bottom: 2px solid #1a237e; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: bold; border-bottom: 2px solid #ddd; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .error { background: #f44336; color: white; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #1a237e; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .grafica { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
        canvas { max-height: 300px; }
        .badge-filtro { background: #1a237e; color: white; padding: 5px 10px; border-radius: 15px; font-size: 12px; display: inline-block; margin: 5px; }

        /* ── Login ── */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #003660; margin: -20px; }
        .login-box { background: white; border-radius: 4px; width: 100%; max-width: 380px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
        .login-header { background: #003660; padding: 28px 28px 20px; text-align: center; border-bottom: 3px solid #007c89; }
        .login-header svg { width: 48px; height: 48px; margin-bottom: 10px; }
        .login-title { font-size: 16px; font-weight: bold; color: white; letter-spacing: 0.1em; text-transform: uppercase; }
        .login-sub { font-size: 10px; color: #71aeb7; letter-spacing: 0.14em; margin-top: 4px; }
        .login-body { padding: 24px 28px 28px; }
        .login-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .login-field label { font-size: 9px; font-weight: bold; letter-spacing: 0.14em; text-transform: uppercase; color: #3d5a66; }
        .login-field select, .login-field input {
            border: 1px solid #c2d8dd; background: #f2efec;
            padding: 10px 12px; font-family: Arial, sans-serif;
            font-size: 13px; color: #1a2e3a; border-radius: 3px;
            outline: none; transition: border-color .15s; width: 100%;
        }
        .login-field select:focus, .login-field input:focus { border-color: #007c89; background: white; }
        .login-err { color: #c0392b; font-size: 11px; margin-bottom: 10px; display: none; padding: 8px 12px; background: #fdf0ef; border-radius: 3px; }
        .btn-login { width: 100%; background: #007c89; color: white; border: none; padding: 12px; font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; letter-spacing: 0.14em; text-transform: uppercase; border-radius: 3px; cursor: pointer; transition: background .15s; }
        .btn-login:hover { background: #003660; }
        .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- ── LOGIN ── -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <div class="login-header">
                <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="26" cy="26" r="25" stroke="#71aeb7" stroke-width="1"/>
                    <path d="M26 38 V20" stroke="#71aeb7" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M26 22 Q20 14 12 16 Q18 18 22 24" stroke="#71aeb7" stroke-width="1.2" stroke-linecap="round" fill="none"/>
                    <path d="M26 22 Q32 14 40 16 Q34 18 30 24" stroke="#71aeb7" stroke-width="1.2" stroke-linecap="round" fill="none"/>
                    <path d="M26 26 Q19 20 13 23 Q19 23 23 28" stroke="#71aeb7" stroke-width="1" stroke-linecap="round" fill="none"/>
                    <path d="M26 26 Q33 20 39 23 Q33 23 29 28" stroke="#71aeb7" stroke-width="1" stroke-linecap="round" fill="none"/>
                    <path d="M16 41 Q21 38 26 40 Q31 38 36 41" stroke="#71aeb7" stroke-width="1" stroke-linecap="round" fill="none"/>
                </svg>
                <div class="login-title">Paraíso del Mar</div>
                <div class="login-sub">Dashboard de Control de Acceso</div>
            </div>
            <div class="login-body">
                <div class="login-field">
                    <label>Usuario</label>
                    <select id="loginNombre">
                        <option value="">— Seleccionar —</option>
                    </select>
                </div>
                <div class="login-field">
                    <label>Contraseña</label>
                    <input id="loginPassword" type="password" placeholder="••••••••"
                           onkeydown="if(event.key==='Enter') doLogin()">
                </div>
                <div class="login-err" id="loginError"></div>
                <button class="btn-login" id="btnLogin" onclick="doLogin()">Ingresar</button>
            </div>
        </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboardScreen" style="display:none">
    <div class="container">
        <div class="header">
            <h1>📊 PARAÍSO DEL MAR</h1>
            <p>Dashboard de Control de Acceso</p>
            <button class="btn-logout-header" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="cambiarTab('estadisticas')">📈 ESTADÍSTICAS</div>
            <div class="tab" onclick="cambiarTab('auditoria')">📋 AUDITORÍA</div>
        </div>

        <!-- TAB: ESTADÍSTICAS -->
        <div id="tab-estadisticas" class="tab-content active">
            <div class="controles">
                <label>📅 Fecha:</label>
                <input type="date" id="fechaInput">
                <button onclick="cargar()">🔄 ACTUALIZAR</button>
                <button class="btn-excel" onclick="exportarExcel()">📥 EXPORTAR EXCEL</button>
            </div>

            <div class="filtros-section">
                <div class="filtros-title">🔍 FILTROS AVANZADOS</div>
                <div class="filtros-row">
                    <div class="filtro-group">
                        <label>Tipo de Persona:</label>
                        <select id="filtroTipo">
                            <option value="">Todos</option>
                            <option value="Dueño">Dueño</option>
                            <option value="Rentista">Rentista</option>
                            <option value="Golfista">Golfista</option>
                            <option value="Restaurante">Restaurante</option>
                            <option value="Proveedor">Proveedor</option>
                            <option value="Empleado">Empleado</option>
                            <option value="Administrativo">Administrativo</option>
                        </select>
                    </div>
                    <div class="filtro-group">
                        <label>Acceso:</label>
                        <select id="filtroAcceso">
                            <option value="">Todos</option>
                            <option value="Muelle Principal">Muelle Principal</option>
                            <option value="Base 4">Base 4</option>
                            <option value="Base 1">Base 1</option>
                        </select>
                    </div>
                    <div class="filtro-group">
                        <label>Hora Desde:</label>
                        <input type="time" id="filtroHoraDesde">
                    </div>
                    <div class="filtro-group">
                        <label>Hora Hasta:</label>
                        <input type="time" id="filtroHoraHasta">
                    </div>
                    <div class="filtro-group">
                        <label>&nbsp;</label>
                        <button onclick="aplicarFiltros()">✓ APLICAR</button>
                    </div>
                    <div class="filtro-group">
                        <label>&nbsp;</label>
                        <button class="btn-limpiar" onclick="limpiarFiltros()">✕ LIMPIAR</button>
                    </div>
                </div>
                <div id="filtrosActivos" style="margin-top: 10px;"></div>
            </div>

            <div id="contenido">
                <p style="text-align: center; color: white; font-size: 18px;">
                    <span class="spinner"></span> Cargando...
                </p>
            </div>
        </div>

        <!-- TAB: AUDITORÍA -->
        <div id="tab-auditoria" class="tab-content">
            <div class="controles">
                <label>📅 Desde:</label>
                <input type="date" id="auditoriaFechaInicio">
                <label>📅 Hasta:</label>
                <input type="date" id="auditoriaFechaFin">
                <button onclick="cargarAuditoria()">🔄 BUSCAR</button>
                <button class="btn-excel" onclick="exportarAuditoriaExcel()">📥 EXPORTAR</button>
            </div>

            <div class="filtros-section">
                <div class="filtros-title">🔍 FILTROS DE AUDITORÍA</div>
                <div class="filtros-row">
                    <div class="filtro-group">
                        <label>Usuario:</label>
                        <input type="text" id="auditoriaUsuario" placeholder="Nombre del usuario">
                    </div>
                    <div class="filtro-group">
                        <label>Tipo:</label>
                        <select id="auditoriaTipo">
                            <option value="">Todos</option>
                            <option value="Dueño">Dueño</option>
                            <option value="Rentista">Rentista</option>
                            <option value="Golfista">Golfista</option>
                            <option value="Restaurante">Restaurante</option>
                            <option value="Proveedor">Proveedor</option>
                            <option value="Empleado">Empleado</option>
                            <option value="Administrativo">Administrativo</option>
                        </select>
                    </div>
                    <div class="filtro-group">
                        <label>Acceso:</label>
                        <select id="auditoriaAcceso">
                            <option value="">Todos</option>
                            <option value="Muelle Principal">Muelle Principal</option>
                            <option value="Base 4">Base 4</option>
                            <option value="Base 1">Base 1</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="contenidoAuditoria">
                <p style="text-align: center; color: white; font-size: 18px;">
                    Selecciona un rango de fechas y presiona BUSCAR
                </p>
            </div>
        </div>
    </div><!-- /container -->
    </div><!-- /dashboardScreen -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        const API = 'https://paraiso-del-mar-backend.onrender.com';
        let datosActuales  = null;
        let datosFiltrados = null;
        let chartInstance  = null;
        let datosAuditoria = [];
        let usuarioActual  = null;

        // ── Auth ──────────────────────────────────────────────────
        function authHeaders() {
            const token = sessionStorage.getItem('pdm_acceso_token');
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        }

        // Cargar lista de usuarios en el select desde endpoint público
        async function cargarUsuarios() {
            try {
                const res  = await fetch(`${API}/api/auth/usuarios-publico`);
                const data = await res.json();
                const sel  = document.getElementById('loginNombre');
                if (data.ok && data.data) {
                    data.data.forEach(u => {
                        const opt = document.createElement('option');
                        opt.value       = u.nombre;
                        opt.textContent = u.nombre;
                        sel.appendChild(opt);
                    });
                }
            } catch(e) {
                console.warn('No se pudo cargar lista de usuarios:', e);
            }
        }

        async function doLogin() {
            const nombre   = document.getElementById('loginNombre').value;
            const password = document.getElementById('loginPassword').value;
            const errEl    = document.getElementById('loginError');
            const btn      = document.getElementById('btnLogin');
            errEl.style.display = 'none';

            if (!nombre || !password) {
                errEl.textContent = 'Selecciona usuario e ingresa contraseña.';
                errEl.style.display = 'block'; return;
            }

            btn.disabled    = true;
            btn.textContent = 'Verificando…';

            try {
                const res  = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, password })
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    usuarioActual = data.usuario;
                    sessionStorage.setItem('pdm_acceso_token',   data.token);
                    sessionStorage.setItem('pdm_acceso_usuario', JSON.stringify(data.usuario));
                    mostrarDashboard();
                } else {
                    errEl.textContent = data.error || 'Usuario o contraseña incorrectos.';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = 'Error de conexión con el servidor.';
                errEl.style.display = 'block';
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Ingresar';
            }
        }

        function mostrarDashboard() {
            document.getElementById('loginScreen').style.display    = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            inicializarFechas();
            cargar();
        }

        function cerrarSesion() {
            sessionStorage.removeItem('pdm_acceso_token');
            sessionStorage.removeItem('pdm_acceso_usuario');
            usuarioActual = null;
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display     = 'flex';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function inicializarFechas() {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fechaInput').value        = hoy;
            document.getElementById('auditoriaFechaFin').value = hoy;
            const hace7 = new Date();
            hace7.setDate(hace7.getDate() - 7);
            document.getElementById('auditoriaFechaInicio').value = hace7.toISOString().split('T')[0];
        }

        // Al cargar: si ya hay sesión activa saltar login
        window.addEventListener('load', () => {
            cargarUsuarios();
            const saved = sessionStorage.getItem('pdm_acceso_usuario');
            if (saved && sessionStorage.getItem('pdm_acceso_token')) {
                usuarioActual = JSON.parse(saved);
                mostrarDashboard();
            }
        });

        // ── Tabs ──────────────────────────────────────────────────
        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if (tab === 'estadisticas') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('tab-estadisticas').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tab-auditoria').classList.add('active');
            }
        }

        // ── Estadísticas (sin JWT) ────────────────────────────────
        async function cargar() {
            try {
                const fecha = document.getElementById('fechaInput').value;
                const res   = await fetch(`${API}/api/estadisticas/${fecha}`);
                const data  = await res.json();
                datosActuales  = data;
                datosFiltrados = data;
                aplicarFiltros();
            } catch (e) {
                document.getElementById('contenido').innerHTML =
                    `<div class="error">❌ Error: No se puede conectar a ${API}</div>`;
            }
        }

        // ── Auditoría (con JWT) ───────────────────────────────────
        async function cargarAuditoria() {
            try {
                const fechaInicio = document.getElementById('auditoriaFechaInicio').value;
                const fechaFin    = document.getElementById('auditoriaFechaFin').value;
                const usuario     = document.getElementById('auditoriaUsuario').value;
                const tipo        = document.getElementById('auditoriaTipo').value;
                const acceso      = document.getElementById('auditoriaAcceso').value;

                let url = `${API}/api/auditoria?fecha_inicio=${fechaInicio}&fecha_fin=${fechaFin}`;
                if (usuario) url += `&usuario_captura=${encodeURIComponent(usuario)}`;
                if (tipo)    url += `&tipo_persona=${encodeURIComponent(tipo)}`;
                if (acceso)  url += `&acceso=${encodeURIComponent(acceso)}`;

                const res = await fetch(url, { headers: authHeaders() });
                if (res.status === 401 || res.status === 403) { cerrarSesion(); return; }

                datosAuditoria = await res.json();

                if (datosAuditoria.length === 0) {
                    document.getElementById('contenidoAuditoria').innerHTML =
                        '<p style="text-align:center;color:white;font-size:18px">No se encontraron registros</p>';
                    return;
                }

                let html = '<div class="tabla"><h2>📋 Histórico de Registros (Últimos 500)</h2>';
                html += '<table><tr><th>Fecha</th><th>Hora</th><th>Acceso</th><th>Tipo</th><th>Cantidad</th><th>Usuario</th><th>Timestamp</th></tr>';

                datosAuditoria.forEach(r => {
                    const ts = new Date(r.timestamp);
                    html += `<tr>
                        <td>${r.fecha}</td>
                        <td>${r.hora}</td>
                        <td>${r.acceso}</td>
                        <td>${r.tipo_persona}</td>
                        <td style="text-align:right">${r.cantidad}</td>
                        <td>${r.usuario_captura}</td>
                        <td>${ts.toLocaleDateString('es-MX')} ${ts.toLocaleTimeString('es-MX')}</td>
                    </tr>`;
                });

                html += '</table></div>';
                document.getElementById('contenidoAuditoria').innerHTML = html;

            } catch (e) {
                document.getElementById('contenidoAuditoria').innerHTML =
                    `<div class="error">❌ Error: No se puede conectar a ${API}</div>`;
            }
        }

        // ── Filtros ───────────────────────────────────────────────
        function aplicarFiltros() {
            if (!datosActuales) return;

            const filtroTipo      = document.getElementById('filtroTipo').value;
            const filtroAcceso    = document.getElementById('filtroAcceso').value;
            const filtroHoraDesde = document.getElementById('filtroHoraDesde').value;
            const filtroHoraHasta = document.getElementById('filtroHoraHasta').value;

            let badgesHTML = '';
            if (filtroTipo)      badgesHTML += `<span class="badge-filtro">Tipo: ${filtroTipo}</span>`;
            if (filtroAcceso)    badgesHTML += `<span class="badge-filtro">Acceso: ${filtroAcceso}</span>`;
            if (filtroHoraDesde) badgesHTML += `<span class="badge-filtro">Desde: ${filtroHoraDesde}</span>`;
            if (filtroHoraHasta) badgesHTML += `<span class="badge-filtro">Hasta: ${filtroHoraHasta}</span>`;
            document.getElementById('filtrosActivos').innerHTML = badgesHTML;

            datosFiltrados = JSON.parse(JSON.stringify(datosActuales));

            if (filtroTipo || filtroAcceso) {
                if (datosFiltrados.detalladoPorAccesoYTipo) {
                    datosFiltrados.detalladoPorAccesoYTipo = datosFiltrados.detalladoPorAccesoYTipo.filter(d => {
                        if (filtroTipo   && d.tipo_persona !== filtroTipo)   return false;
                        if (filtroAcceso && d.acceso       !== filtroAcceso) return false;
                        return true;
                    });
                    const tm = {}, am = {};
                    datosFiltrados.detalladoPorAccesoYTipo.forEach(d => {
                        tm[d.tipo_persona] = (tm[d.tipo_persona] || 0) + parseInt(d.total);
                        am[d.acceso]       = (am[d.acceso]       || 0) + parseInt(d.total);
                    });
                    datosFiltrados.porTipo   = Object.keys(tm).map(tipo_persona => ({ tipo_persona, total: tm[tipo_persona] }));
                    datosFiltrados.porAcceso = Object.keys(am).map(acceso       => ({ acceso,        total: am[acceso] }));
                }
            }

            if ((filtroHoraDesde || filtroHoraHasta) && datosFiltrados.porHora) {
                datosFiltrados.porHora = datosFiltrados.porHora.filter(h => {
                    const hora = h.hora.substring(0, 5);
                    if (filtroHoraDesde && hora < filtroHoraDesde) return false;
                    if (filtroHoraHasta && hora > filtroHoraHasta) return false;
                    return true;
                });
            }

            datosFiltrados.total = datosFiltrados.detalladoPorAccesoYTipo
                ? datosFiltrados.detalladoPorAccesoYTipo.reduce((sum, d) => sum + parseInt(d.total), 0)
                : datosFiltrados.total;

            mostrarDatos();
        }

        function limpiarFiltros() {
            document.getElementById('filtroTipo').value      = '';
            document.getElementById('filtroAcceso').value    = '';
            document.getElementById('filtroHoraDesde').value = '';
            document.getElementById('filtroHoraHasta').value = '';
            document.getElementById('filtrosActivos').innerHTML = '';
            datosFiltrados = datosActuales;
            mostrarDatos();
        }

        function mostrarDatos() {
            const data = datosFiltrados;
            let html = '<div class="kpi-container">';
            html += `<div class="kpi"><div class="kpi-numero">${data.total}</div><div class="kpi-label">TOTAL</div></div>`;

            if (data.detalladoPorAccesoYTipo?.length > 0) {
                ['Muelle Principal','Base 4','Base 1'].forEach(nombreAcceso => {
                    const tot = data.detalladoPorAccesoYTipo
                        .filter(d => d.acceso === nombreAcceso)
                        .reduce((sum, d) => sum + parseInt(d.total), 0);
                    if (tot > 0) html += `<div class="kpi"><div class="kpi-numero">${tot}</div><div class="kpi-label">${nombreAcceso}</div></div>`;
                });
            } else if (data.porAcceso) {
                data.porAcceso.forEach(a => {
                    html += `<div class="kpi"><div class="kpi-numero">${a.total}</div><div class="kpi-label">${a.acceso}</div></div>`;
                });
            }
            html += '</div>';

            if (data.porHora?.length > 0) {
                html += '<div class="grafica"><h2>📈 Ingresos por Hora</h2><canvas id="chartHora"></canvas></div>';
            }
            if (data.porTipo?.length > 0) {
                html += '<div class="tabla"><h2>Por Tipo de Persona</h2><table><tr><th>Tipo</th><th style="text-align:right">Cantidad</th></tr>';
                data.porTipo.forEach(t => { html += `<tr><td>${t.tipo_persona}</td><td style="text-align:right">${t.total}</td></tr>`; });
                html += '</table></div>';
            }
            if (data.porAcceso?.length > 0) {
                html += '<div class="tabla"><h2>Por Acceso</h2><table><tr><th>Acceso</th><th style="text-align:right">Cantidad</th></tr>';
                data.porAcceso.forEach(a => { html += `<tr><td>${a.acceso}</td><td style="text-align:right">${a.total}</td></tr>`; });
                html += '</table></div>';
            }
            if (data.detalladoPorAccesoYTipo?.length > 0) {
                html += '<div class="tabla"><h2>Detalle por Acceso y Tipo</h2><table><tr><th>Acceso</th><th>Tipo</th><th style="text-align:right">Cantidad</th></tr>';
                data.detalladoPorAccesoYTipo.forEach(d => {
                    html += `<tr><td>${d.acceso}</td><td>${d.tipo_persona}</td><td style="text-align:right">${d.total}</td></tr>`;
                });
                html += '</table></div>';
            }

            document.getElementById('contenido').innerHTML = html;
            if (data.porHora?.length > 0) setTimeout(() => crearGrafica(data.porHora), 100);
        }

        function crearGrafica(porHora) {
            const ctx = document.getElementById('chartHora');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: porHora.map(h => h.hora.substring(0, 5)),
                    datasets: [{ label: 'Ingresos', data: porHora.map(h => h.total),
                        borderColor: '#1a237e', backgroundColor: 'rgba(26,35,126,0.1)', tension: 0.4, fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        // ── Exportar ──────────────────────────────────────────────
        function exportarExcel() {
            if (!datosFiltrados) { alert('No hay datos para exportar'); return; }
            const fecha = document.getElementById('fechaInput').value;
            const wb = XLSX.utils.book_new();
            const resumen = [
                ['PARAÍSO DEL MAR - Reporte de Ingresos'], ['Fecha:', fecha],
                ['Total General:', datosFiltrados.total], [''], ['Por Acceso'], ['Acceso','Cantidad']
            ];
            datosFiltrados.porAcceso?.forEach(a => resumen.push([a.acceso, a.total]));
            resumen.push([''], ['Por Tipo de Persona'], ['Tipo','Cantidad']);
            datosFiltrados.porTipo?.forEach(t => resumen.push([t.tipo_persona, t.total]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumen), 'Resumen');
            if (datosFiltrados.detalladoPorAccesoYTipo?.length > 0) {
                const det = [['Acceso','Tipo de Persona','Cantidad']];
                datosFiltrados.detalladoPorAccesoYTipo.forEach(d => det.push([d.acceso, d.tipo_persona, d.total]));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(det), 'Detalle');
            }
            if (datosFiltrados.porHora?.length > 0) {
                const ph = [['Hora','Cantidad']];
                datosFiltrados.porHora.forEach(h => ph.push([h.hora, h.total]));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ph), 'Por Hora');
            }
            XLSX.writeFile(wb, `Paraiso_del_Mar_${fecha}.xlsx`);
        }

        function exportarAuditoriaExcel() {
            if (!datosAuditoria.length) { alert('No hay datos de auditoría para exportar'); return; }
            const wb  = XLSX.utils.book_new();
            const fi  = document.getElementById('auditoriaFechaInicio').value;
            const ff  = document.getElementById('auditoriaFechaFin').value;
            const data = [
                ['PARAÍSO DEL MAR - Auditoría de Registros'],
                ['Desde:', fi], ['Hasta:', ff], [''],
                ['Fecha','Hora','Acceso','Tipo','Cantidad','Usuario','Timestamp']
            ];
            datosAuditoria.forEach(r => {
                const ts = new Date(r.timestamp);
                data.push([r.fecha, r.hora, r.acceso, r.tipo_persona, r.cantidad, r.usuario_captura,
                    `${ts.toLocaleDateString('es-MX')} ${ts.toLocaleTimeString('es-MX')}`]);
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Auditoría');
            XLSX.writeFile(wb, `Auditoria_${fi}_a_${ff}.xlsx`);
        }

        setInterval(() => { if (sessionStorage.getItem('pdm_acceso_token')) cargar(); }, 30000);
    </script>
</body>
</html>
